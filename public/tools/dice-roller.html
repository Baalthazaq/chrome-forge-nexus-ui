<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cyberpunk Dice Tray</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#05060a;
      --panel:#0a0c12;
      --panel2:#070911;
      --ink:#d6d9e6;
      --muted:#8b92b3;
      --line:#141a2c;
      --btn:#0d1120;
      --btn2:#0b0f1d;
      --shadow: rgba(0,0,0,.55);
      --font-main: 'Orbitron', sans-serif;
    }

    html, body { height: 100%; margin: 0; background: var(--bg); color: var(--ink); }
    body { font-family: var(--font-main); overflow: hidden; letter-spacing: 1px; }

    .app { height: 100vh; display: flex; flex-direction: column; }

    .ui {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0)) , var(--panel);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 10px 30px var(--shadow);
      z-index: 5;
      flex-shrink: 0;
    }

    .uiInner{
      padding: 10px 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .topSection{ display: grid; grid-template-columns: 200px 1fr; gap: 12px; }

    .resultBox{
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 70px;
    }

    .tagRow{ height: 26px; display: flex; align-items: center; }
    .tag{
      display: none;
      font-weight: 900;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      user-select: none;
      transition: all 0.3s ease;
    }
    .tag.show{ display:inline-block; }
    .tag.hope{ color:#ffd700; text-shadow:0 0 10px rgba(255,215,0,0.4); }
    .tag.fear{ color:#ff2a6d; text-shadow:0 0 10px rgba(255,42,109,0.4); }
    
    .tag.crit{ 
      font-size: 24px;
      padding: 4px 12px;
      color: #fff;
      background: linear-gradient(90deg, rgba(255,215,0,0.15), rgba(127,42,255,0.15));
      border: 1px solid rgba(255,255,255,0.4);
      text-shadow: 0 0 10px #fff, 0 0 20px #ffd700, 0 0 30px #ff2a6d, 0 0 40px #7f2aff;
      animation: critPulse 1s infinite alternate ease-in-out;
    }
    @keyframes critPulse {
        from { transform: scale(0.98); opacity: 0.9; }
        to { transform: scale(1.02); opacity: 1; }
    }

    .total{
      font-size: 38px;
      font-weight: 900;
      line-height: 1;
      text-align: right;
      color: #fff;
      text-shadow: 0 0 20px rgba(0,245,255,0.2);
    }

    .eqBox{
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 6px 10px;
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      align-items: center;
      gap: 10px;
    }
    .eqDisplay{
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      min-height: 20px;
      cursor: text;
      font-size: 14px;
      font-family: var(--font-main);
      flex: 1;
    }
    .eqDisplay input[type="text"]{
      background: transparent;
      border: none;
      color: var(--ink);
      font-family: var(--font-main);
      font-size: 14px;
      width: 100%;
      outline: none;
    }
    .bonusWrap{
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
    }
    .bonusWrap input{
      width: 50px;
      background: #050711;
      border: 1px solid var(--line);
      color: #fff;
      padding: 8px;
      border-radius: 6px;
      text-align: center;
      font-family: var(--font-main);
    }

    .btn{
      background: var(--btn);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      padding: 0 20px;
      height: 40px;
      border-radius: 6px;
      font-family: var(--font-main);
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      font-size: 12px;
    }
    .btn:active{ transform:translateY(1px); }
    #rollBtn{
      background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(0,0,0,0.5), rgba(127,42,255,0.15));
      border-color: rgba(255,255,255,0.2);
      box-shadow: 0 0 10px rgba(255,255,255,0.05);
      text-shadow: 0 0 5px rgba(255,255,255,0.5);
    }

    .colorRow{
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 4px;
    }
    .colorRow .label{ font-size: 9px; text-transform: uppercase; color: var(--muted); margin-right: 4px; }
    .colorSwatch{
      width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
      border: 2px solid rgba(255,255,255,0.15);
      transition: all 0.15s;
    }
    .colorSwatch.active{
      border-color: #fff;
      box-shadow: 0 0 8px rgba(255,255,255,0.4);
      transform: scale(1.2);
    }

    .diceGrid{ display: grid; grid-template-columns: repeat(9, 1fr); gap: 8px; }

    .chip{
      height: 44px;
      border-radius: 6px;
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(0,0,0,0)), var(--btn2);
      border: 1px solid transparent;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      font-size: 12px;
      font-weight: 700;
      color: var(--ink);
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      background-clip: padding-box; 
    }
    .chip::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 6px;
      padding: 1px;
      background: linear-gradient(90deg, #00f5ff, #0066ff);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
    .chip:active{ transform:translateY(1px); }

    .chip.negative{ color: #ff8a8a; }
    .chip.negative::before{ background: linear-gradient(90deg, #ff3b3b, #700000); }
    .chip.hopeBtn { color: #ffd700; font-size: 14px; font-weight: 900; }
    .chip.hopeBtn::before { background: linear-gradient(90deg, #ffd700, #fff6cc); }
    .chip.fearBtn { color: #ff2a6d; font-size: 14px; font-weight: 900;}
    .chip.fearBtn::before { background: linear-gradient(90deg, #ff2a6d, #7f2aff); }

    .chip.duality{ font-weight: 900; color: #fff; }
    .chip.duality::before{ background: linear-gradient(90deg, #ffffff, #ffd700, #000000, #ff2a6d, #7f2aff); }

    .chip.customBtn::before{ background: linear-gradient(90deg, #0066ff, #ff3b3b); }

    .customCell{ display: flex; gap: 4px; }
    .customInput{
      width: 40px; background: #050711; border: 1px solid var(--line); border-radius: 6px;
      color: #fff; text-align: center; font-family: var(--font-main); font-size: 12px; outline: none;
    }
    .chip.customBtn{ flex: 1; height: 44px; }

    .trayWrap{
      flex: 1;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 120%, rgba(127,42,255,0.08), transparent 60%),
        radial-gradient(circle at 20% 20%, rgba(0,245,255,0.05), transparent 40%),
        #04050a;
    }
    canvas{ display:block; }

    @media (min-width: 900px){ .chip { min-width: 50px; font-size: 13px; } }
  </style>
</head>

<body>
  <div class="app">
    <div class="ui">
      <div class="uiInner">
        <div class="topSection">
          <div class="resultBox">
            <div class="tagRow"><span id="dualityTag" class="tag">HOPE</span></div>
            <div id="total" class="total">—</div>
          </div>
          <div class="eqBox">
            <div id="eqDisplay" class="eqDisplay">
              <input id="equation" type="text" spellcheck="false" autocomplete="off" placeholder="Equation..." />
            </div>
            <div class="bonusWrap"><label>Bonus</label><input id="bonus" type="number" value="0" step="1" /></div>
            <button id="clearBtn" class="btn">Clr</button>
            <button id="rollBtn" class="btn">ROLL</button>
          </div>
        </div>
        <div class="colorRow" id="colorRow">
          <span class="label">Color</span>
        </div>
        <div class="diceGrid">
          <!-- Row 1: DUAL, D?, then d4-d8 + Hope -->
          <div class="chip duality" id="dualityBtn">DUAL</div>
          <div class="customCell">
            <input id="customSides" class="customInput" type="number" value="7" />
            <div class="chip customBtn" id="customBtn">D?</div>
          </div>
          <div class="chip dieBtn" data-sides="4">d4</div>
          <div class="chip dieBtn" data-sides="6">d6</div>
          <div class="chip dieBtn" data-sides="8">d8</div>
          <div class="chip dieBtn" data-sides="10">d10</div>
          <div class="chip dieBtn" data-sides="12">d12</div>
          <div class="chip dieBtn" data-sides="20">d20</div>
          <div class="chip" id="d100Btn">d%</div>

          <!-- Row 2: negatives + Fear -->
          <div class="chip hopeBtn" id="addHBtn">H</div>
          <div class="chip fearBtn" id="addFBtn">F</div>
          <div class="chip negative dieBtn" data-sides="4" data-sign="-1">-d4</div>
          <div class="chip negative dieBtn" data-sides="6" data-sign="-1">-d6</div>
          <div class="chip negative dieBtn" data-sides="8" data-sign="-1">-d8</div>
          <div class="chip negative dieBtn" data-sides="10" data-sign="-1">-d10</div>
          <div class="chip negative dieBtn" data-sides="12" data-sign="-1">-d12</div>
          <div class="chip negative dieBtn" data-sides="20" data-sign="-1">-d20</div>
          <div class="chip negative" id="negD100Btn">-d%</div>
        </div>
      </div>
    </div>
    <div class="trayWrap" id="trayWrap"><canvas id="tray"></canvas></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>
  <script>
    (() => {
      const { Engine, World, Bodies, Body, Query } = Matter;
      const trayWrap = document.getElementById('trayWrap');
      const canvas = document.getElementById('tray');
      const ctx = canvas.getContext('2d', { alpha: false });

      const bgCanvas = document.createElement('canvas');
      const bgCtx = bgCanvas.getContext('2d');

      const elEquation = document.getElementById('equation');
      const elBonus = document.getElementById('bonus');
      const elTotal = document.getElementById('total');
      const elTag = document.getElementById('dualityTag');

      const engine = Engine.create();
      engine.gravity.scale = 0;
      const world = engine.world;

      let dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      let W = 0, H = 0;
      const MARGIN = 50, WALL_THICK = 100;
      let walls = [];
      const dice = [], dieByBodyId = new Map();

      // --- Color Palette ---
      const COLOR_PALETTE = [
        { value: null, label: 'Default', css: 'linear-gradient(135deg, #00f5ff, #ff3b3b)' },
        { value: '#00f5ff', label: 'Cyan', css: '#00f5ff' },
        { value: '#ff3b3b', label: 'Red', css: '#ff3b3b' },
        { value: '#39ff14', label: 'Green', css: '#39ff14' },
        { value: '#7f2aff', label: 'Purple', css: '#7f2aff' },
        { value: '#ff8c00', label: 'Orange', css: '#ff8c00' },
        { value: '#ffffff', label: 'White', css: '#ffffff' },
      ];
      let activeColor = null;

      // Build color swatches
      const colorRow = document.getElementById('colorRow');
      COLOR_PALETTE.forEach(c => {
        const el = document.createElement('div');
        el.className = 'colorSwatch' + (c.value === activeColor ? ' active' : '');
        el.style.background = c.css;
        el.title = c.label;
        el.onclick = () => {
          activeColor = c.value;
          document.querySelectorAll('.colorSwatch').forEach(s => s.classList.remove('active'));
          el.classList.add('active');
          // Update chip border colors for normal dice buttons
          updateChipColors();
        };
        colorRow.appendChild(el);
      });

      function updateChipColors() {
        document.querySelectorAll('.dieBtn:not(.negative)').forEach(b => {
          if (activeColor) {
            b.style.color = activeColor;
            b.style.setProperty('--chip-border', activeColor + '80');
          } else {
            b.style.color = '';
            b.style.setProperty('--chip-border', '');
          }
        });
        const customBtn = document.getElementById('customBtn');
        if (activeColor) {
          customBtn.style.color = activeColor;
        } else {
          customBtn.style.color = '';
        }
      }

      // --- Resize Logic ---
      function handleResize(){
        const rect = trayWrap.getBoundingClientRect();
        const newW = Math.floor(rect.width);
        const newH = Math.floor(rect.height);
        if (newW === W && newH === H) return;
        W = newW; H = newH;
        canvas.width = Math.floor(W * dpr);
        canvas.height = Math.floor(H * dpr);
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        bgCanvas.width = canvas.width;
        bgCanvas.height = canvas.height;
        renderStaticBackground();
        World.remove(world, walls);
        walls = [];
        const opts = { isStatic: true, friction: 0.05, restitution: 0.5 };
        walls.push(Bodies.rectangle(MARGIN - WALL_THICK/2, H/2, WALL_THICK, H*2, opts));
        walls.push(Bodies.rectangle(W - MARGIN + WALL_THICK/2, H/2, WALL_THICK, H*2, opts));
        walls.push(Bodies.rectangle(W/2, MARGIN - WALL_THICK/2, W*2, WALL_THICK, opts));
        walls.push(Bodies.rectangle(W/2, H - MARGIN + WALL_THICK/2, W*2, WALL_THICK, opts));
        World.add(world, walls);
        const safeXMin = MARGIN + 20, safeXMax = W - MARGIN - 20;
        const safeYMin = MARGIN + 20, safeYMax = H - MARGIN - 20;
        for (const d of dice){
          const b = d.body;
          Body.setPosition(b, {
            x: Math.max(safeXMin, Math.min(safeXMax, b.position.x)), 
            y: Math.max(safeYMin, Math.min(safeYMax, b.position.y))
          });
        }
      }

      function renderStaticBackground(){
        bgCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
        bgCtx.clearRect(0,0,W,H);
        bgCtx.globalAlpha = 0.1; 
        bgCtx.strokeStyle = '#00f5ff'; 
        bgCtx.lineWidth = 1;
        bgCtx.beginPath();
        for(let x=0; x<=W; x+=50){ bgCtx.moveTo(x,0); bgCtx.lineTo(x,H); }
        for(let y=0; y<=H; y+=50){ bgCtx.moveTo(0,y); bgCtx.lineTo(W,y); }
        bgCtx.stroke();
      }

      window.addEventListener('resize', handleResize);

      // --- Helpers ---
      function randInt(min, max){ return Math.floor(Math.random() * (max - min + 1)) + min; }
      
      function shapeForSides(sides){
        if (sides === 100) return { kind:'circle' };
        if (sides === 4 || sides === 8 || sides === 10) return { kind:'poly', verts: 3 };
        if (sides === 12) return { kind:'poly', verts: 5 };
        if (sides === 20) return { kind:'poly', verts: 6 };
        return { kind:'poly', verts: 4 };
      }

      let dieIndexCounter = 0;

      function makeDie({ sides, sign=+1, flavor='normal', color=null }){
        let size = Math.max(36, Math.min(60, 30 + Math.sqrt(Math.max(1, sides)) * 3.5));
        // Hope/Fear dice are slightly larger
        if (flavor === 'hope' || flavor === 'fear') size *= 1.3;
        
        const buf = 150;
        const px = randInt(buf, W - buf);
        const py = randInt(buf, H - buf);

        const physOpts = { friction: 0.05, frictionAir: 0.015, restitution: 0.6, density: 0.002 };
        const shape = shapeForSides(sides);
        
        let body;
        if (shape.kind === 'circle') body = Bodies.circle(px, py, size * 0.55, physOpts);
        else body = Bodies.polygon(px, py, shape.verts, size * 0.55, physOpts);
        body.isDie = true;

        const die = { 
          sides, sign, flavor, value: randInt(1, sides), body, size, 
          isEnlarged: false, isCrit: false, critPartner: null, 
          color: color, index: dieIndexCounter++ 
        };
        dieByBodyId.set(body.id, die);
        dice.push(die);
        World.add(world, body);
        
        const angle = Math.random() * Math.PI * 2;
        const speed = 12 + Math.random() * 5;
        Body.setVelocity(body, { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed });
        Body.setAngularVelocity(body, (Math.random() - 0.5) * 0.3);
        
        return die;
      }

      function clearDice(){
        for (const d of dice){ World.remove(world, d.body); dieByBodyId.delete(d.body.id); }
        dice.length = 0;
        dieIndexCounter = 0;
      }

      // --- Equation & Logic ---
      function parseEquation(str){
        const s = (str || '').replace(/\s+/g,'');
        if (!s) return { diceTerms: [], constant: 0 };
        const eqStr = (s[0] !== '+' && s[0] !== '-') ? '+' + s : s;
        
        let i = 0; const diceTerms = []; let constant = 0;
        while (i < eqStr.length){
          const sign = (eqStr[i] === '+') ? 1 : -1; i++;
          let numStr = ''; while (i < eqStr.length && /[0-9]/.test(eqStr[i])) { numStr += eqStr[i++]; }
          const num = numStr ? parseInt(numStr, 10) : null;
          
          if (i < eqStr.length) {
            const char = eqStr[i];
            if (char === 'd' || char === 'D'){
              i++;
              let sides = 0;
              if (eqStr[i] === '%') { i++; sides=100; }
              else {
                let sidesStr = ''; while (i < eqStr.length && /[0-9]/.test(eqStr[i])) sidesStr += eqStr[i++];
                sides = parseInt(sidesStr, 10);
              }
              if (sides > 0) {
                 const count = num ?? 1;
                 for (let k=0; k<count; k++) diceTerms.push({ sides, sign, flavor:'normal' });
              }
            } else if (char === 'H' || char === 'F') {
              i++;
              const count = num ?? 1;
              const flavor = (char === 'H') ? 'hope' : 'fear';
              for (let k=0; k<count; k++) diceTerms.push({ sides: 12, sign, flavor });
            } else if (num !== null) {
              constant += sign * num;
            } else { i++; }
          } else if (num !== null) { constant += sign * num; }
        }
        return { diceTerms, constant };
      }

      function buildEquationString(diceTerms, constant){
        const counts = new Map();
        let hCount = 0, fCount = 0;

        for (const t of diceTerms){
          if (t.flavor === 'hope') { hCount++; continue; }
          if (t.flavor === 'fear') { fCount++; continue; }
          const key = `${t.sign}_${t.sides}_${t.color || 'def'}`;
          const existing = counts.get(key);
          if (existing) existing.count++;
          else counts.set(key, { count: 1, sides: t.sides, sign: t.sign, color: t.color || null });
        }

        const parts = [];
        if (hCount > 0) parts.push({ txt: hCount > 1 ? `${hCount}H` : 'H', val: 1, color: '#ffd700', flavor: 'hope' });
        if (fCount > 0) parts.push({ txt: fCount > 1 ? `${fCount}F` : 'F', val: 1, color: '#ff2a6d', flavor: 'fear' });
        
        const sortedEntries = Array.from(counts.values()).sort((a,b) => Math.abs(b.sides) - Math.abs(a.sides));
        for (const entry of sortedEntries){
           const label = entry.sides === 100 ? 'd%' : `d${entry.sides}`;
           const qty = entry.count > 1 ? entry.count : '';
           parts.push({ txt: `${qty}${label}`, val: entry.sign, color: entry.color, flavor: 'normal' });
        }

        if (constant !== 0) parts.push({ txt: Math.abs(constant).toString(), val: constant, color: null, flavor: 'normal' });
        
        return { str: parts.map((p, idx) => {
            const op = (p.val < 0) ? "-" : (idx === 0 ? "" : "+");
            return op + p.txt;
          }).join(''), parts };
      }

      function rebuildEquation(currentStr, newTerms = []){
        const parsed = parseEquation(currentStr);
        let terms = parsed.diceTerms;
        newTerms.forEach(t => { if (t.type !== 'constant') terms.push(t); });
        return buildEquationString(terms, parsed.constant);
      }

      // --- Colored equation display ---
      function updateEquationDisplay(parts) {
        const eqDisplay = document.getElementById('eqDisplay');
        // When editing, show the input; otherwise show colored spans
        if (document.activeElement === elEquation) return;
        
        if (!parts || parts.length === 0) {
          elEquation.style.display = '';
          // Clear any spans
          const spans = eqDisplay.querySelectorAll('span');
          spans.forEach(s => s.remove());
          return;
        }

        // Hide input, show colored spans
        elEquation.style.display = 'none';
        // Remove old spans
        const oldSpans = eqDisplay.querySelectorAll('span');
        oldSpans.forEach(s => s.remove());

        for (const p of parts) {
          const span = document.createElement('span');
          const op = (p.val < 0) ? "-" : (parts.indexOf(p) === 0 ? "" : "+");
          span.textContent = op + p.txt;
          span.style.color = p.flavor === 'hope' ? '#ffd700' : p.flavor === 'fear' ? '#ff2a6d' : (p.color || '#d6d9e6');
          span.style.fontFamily = 'var(--font-main)';
          span.style.fontSize = '14px';
          eqDisplay.appendChild(span);
        }
      }

      // When equation input is focused, show it; when blurred, show colored display
      elEquation.addEventListener('focus', () => {
        elEquation.style.display = '';
        const spans = document.getElementById('eqDisplay').querySelectorAll('span');
        spans.forEach(s => s.remove());
      });
      elEquation.addEventListener('blur', () => {
        // Rebuild colored display from current dice
        const result = buildEquationStringFromDice();
        updateEquationDisplay(result.parts);
      });

      function buildEquationStringFromDice() {
        // Build colored segments from actual dice array
        const groups = [];
        for (const d of dice) {
          const existing = groups.find(g => g.sign === d.sign && g.sides === d.sides && g.color === d.color && g.flavor === d.flavor);
          if (existing) existing.count++;
          else groups.push({ sign: d.sign, sides: d.sides, color: d.color, flavor: d.flavor, count: 1 });
        }

        const parts = [];
        const hopes = groups.filter(g => g.flavor === 'hope');
        const fears = groups.filter(g => g.flavor === 'fear');
        const normals = groups.filter(g => g.flavor === 'normal').sort((a, b) => Math.abs(b.sides) - Math.abs(a.sides));
        const ordered = [...hopes, ...fears, ...normals];

        ordered.forEach((g, idx) => {
          let label;
          if (g.flavor === 'hope') label = g.count > 1 ? `${g.count}H` : 'H';
          else if (g.flavor === 'fear') label = g.count > 1 ? `${g.count}F` : 'F';
          else {
            const sideLabel = g.sides === 100 ? 'd%' : `d${g.sides}`;
            label = (g.count > 1 ? g.count : '') + sideLabel;
          }
          parts.push({
            txt: label,
            val: g.sign,
            color: g.flavor === 'hope' ? '#ffd700' : g.flavor === 'fear' ? '#ff2a6d' : g.color,
            flavor: g.flavor
          });
        });

        const parsed = parseEquation(elEquation.value);
        if (parsed.constant !== 0) {
          parts.push({ txt: Math.abs(parsed.constant).toString(), val: parsed.constant, color: null, flavor: 'normal' });
        }

        return { parts };
      }

      // --- Crit matching: ALL pairs ---
      function computeResults(){
        const parsed = parseEquation(elEquation.value);
        const eqConst = parsed.constant;
        let sum = eqConst; 
        const hopeDice = [];
        const fearDice = [];

        for (const d of dice){
          sum += d.value * d.sign;
          if (d.sign === 1 && d.flavor === 'hope') hopeDice.push(d);
          else if (d.sign === 1 && d.flavor === 'fear') fearDice.push(d);
        }
        
        const hasHope = hopeDice.length > 0;
        const hasFear = fearDice.length > 0;

        // Clear all crit state
        for (const d of dice) { d.isCrit = false; d.critPartner = null; }

        // Pair ALL matching hope/fear dice by value
        let hasCrit = false;
        if (hasHope && hasFear) {
          const usedFear = new Set();
          for (const h of hopeDice) {
            for (let fi = 0; fi < fearDice.length; fi++) {
              if (!usedFear.has(fi) && fearDice[fi].value === h.value) {
                h.isCrit = true;
                h.critPartner = fearDice[fi];
                fearDice[fi].isCrit = true;
                fearDice[fi].critPartner = h;
                usedFear.add(fi);
                hasCrit = true;
                break;
              }
            }
          }
        }

        // Determine duality state
        let dualityState = 'none';
        if (hasHope && hasFear) {
          if (hasCrit) {
            dualityState = 'crit';
          } else {
            const maxH = Math.max(...hopeDice.map(d => d.value));
            const maxF = Math.max(...fearDice.map(d => d.value));
            if (maxH > maxF) dualityState = 'hope';
            else dualityState = 'fear';
          }
        }

        return { sum, hasDuality: (hasHope && hasFear), dualityState };
      }

      function updateHUD(){
        const r = computeResults();
        elTotal.textContent = Number.isFinite(r.sum) ? String(r.sum) : '—';
        
        elTag.className = 'tag';
        if (r.hasDuality) {
          elTag.classList.add('show');
          if (r.dualityState === 'hope'){ elTag.textContent = 'HOPE'; elTag.classList.add('hope'); }
          else if (r.dualityState === 'fear'){ elTag.textContent = 'FEAR'; elTag.classList.add('fear'); }
          else if (r.dualityState === 'crit'){ elTag.textContent = 'CRITICAL'; elTag.classList.add('crit'); }
        }

        // Apply Crit Scaling
        for (const d of dice){
          if (d.isCrit && !d.isEnlarged) { Body.scale(d.body, 1.8, 1.8); d.size *= 1.8; d.isEnlarged = true; }
          else if (!d.isCrit && d.isEnlarged) { Body.scale(d.body, 0.555, 0.555); d.size /= 1.8; d.isEnlarged = false; }
        }

        // Update colored equation display
        const result = buildEquationStringFromDice();
        updateEquationDisplay(result.parts);
      }

      function rollFromEquation(){
        // Preserve colors from existing dice before clearing
        const existingDiceColors = dice.map(d => ({ sides: d.sides, sign: d.sign, flavor: d.flavor, color: d.color }));
        const parsed = parseEquation(elEquation.value);
        const built = buildEquationString(parsed.diceTerms, parsed.constant);
        elEquation.value = built.str;
        elBonus.value = parsed.constant;
        
        clearDice();
        const colorPool = [...existingDiceColors];
        for (const t of parsed.diceTerms){
          let dieColor = null;
          if (t.flavor !== 'hope' && t.flavor !== 'fear') {
            const matchIdx = colorPool.findIndex(c => c.sides === t.sides && c.sign === t.sign && c.flavor === t.flavor);
            if (matchIdx >= 0) {
              dieColor = colorPool[matchIdx].color;
              colorPool.splice(matchIdx, 1);
            } else {
              dieColor = activeColor;
            }
          }
          makeDie({ 
            sides: t.sides, 
            sign: t.sign, 
            flavor: t.flavor,
            color: dieColor
          });
        }
        updateHUD();
      }

      // --- Interaction ---
      function addTerm(sides, sign=1, flavor='normal'){
         const dieColor = (flavor === 'hope' || flavor === 'fear') ? null : activeColor;
         const built = rebuildEquation(elEquation.value, [{ sides, sign, flavor, color: dieColor, type: 'die' }]);
         elEquation.value = built.str;
         makeDie({ sides: (flavor==='hope'||flavor==='fear')?12:sides, sign, flavor, color: dieColor });
         updateHUD();
      }

      document.getElementById('rollBtn').onclick = rollFromEquation;
      document.getElementById('clearBtn').onclick = () => { 
        elEquation.value=''; elBonus.value='0'; 
        clearDice(); 
        updateHUD(); 
        // Clear colored display
        elEquation.style.display = '';
        const spans = document.getElementById('eqDisplay').querySelectorAll('span');
        spans.forEach(s => s.remove());
      };
      
      document.querySelectorAll('.dieBtn').forEach(b => b.onclick = () => addTerm(+b.dataset.sides, +b.dataset.sign||1));
      document.getElementById('d100Btn').onclick = () => addTerm(100, 1);
      document.getElementById('negD100Btn').onclick = () => addTerm(100, -1);
      document.getElementById('addHBtn').onclick = () => addTerm(12, 1, 'hope');
      document.getElementById('addFBtn').onclick = () => addTerm(12, 1, 'fear');
      
      document.getElementById('dualityBtn').onclick = () => {
        const built = rebuildEquation(elEquation.value, [
          { sides:12, sign:1, flavor:'hope', type:'die' },
          { sides:12, sign:1, flavor:'fear', type:'die' }
        ]);
        elEquation.value = built.str;
        makeDie({ sides:12, sign:1, flavor:'hope' }); 
        makeDie({ sides:12, sign:1, flavor:'fear' });
        updateHUD();
      };

      document.getElementById('customBtn').onclick = () => { 
        let v = +document.getElementById('customSides').value; 
        if (v) addTerm(Math.abs(v), v<0?-1:1); 
      };

      elEquation.addEventListener('input', () => {
        const parsed = parseEquation(elEquation.value);
        elBonus.value = parsed.constant;
        updateHUD();
      });

      elEquation.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          rollFromEquation();
        }
      });

      // Click on the colored display to focus the equation input
      document.getElementById('eqDisplay').addEventListener('click', (e) => {
        if (e.target !== elEquation) {
          elEquation.style.display = '';
          const spans = document.getElementById('eqDisplay').querySelectorAll('span');
          spans.forEach(s => s.remove());
          elEquation.focus();
        }
      });

      elBonus.oninput = () => {
        const parsed = parseEquation(elEquation.value);
        const bonus = parseInt(elBonus.value || '0', 10) || 0;
        const built = buildEquationString(parsed.diceTerms, bonus);
        elEquation.value = built.str;
        updateHUD();
      };

      canvas.addEventListener('pointerdown', ev => {
         const r = canvas.getBoundingClientRect();
         const p = { x: ev.clientX - r.left, y: ev.clientY - r.top };
         const hit = Query.point(dice.map(d=>d.body), p)[0];
         if (hit) { 
           const die = dieByBodyId.get(hit.id); 
           die.value = randInt(1, die.sides); 
           const angle = Math.random() * Math.PI * 2;
           Body.setVelocity(die.body, { x: Math.cos(angle)*10, y: Math.sin(angle)*10 });
           Body.setAngularVelocity(die.body, (Math.random()-0.5)*0.3);
           updateHUD(); 
         }
      }, {passive:true});

      // --- Render Helpers ---
      function getCritGradient(ctx, die, r, timeMs){
        const ang = (timeMs * 0.0012) + (die.body.id * 0.37);
        const gx0 = Math.cos(ang) * (r * 0.75), gy0 = Math.sin(ang) * (r * 0.75);
        const grad = ctx.createLinearGradient(gx0, gy0, -gx0, -gy0);
        grad.addColorStop(0.00, '#ffffff');
        grad.addColorStop(0.20, '#ffffff');
        grad.addColorStop(0.25, '#ffd700');
        grad.addColorStop(0.35, '#000000');
        grad.addColorStop(0.65, '#000000');
        grad.addColorStop(0.75, '#ff2a6d');
        grad.addColorStop(0.85, '#7f2aff');
        grad.addColorStop(1.00, '#7f2aff');
        return grad;
      }

      function getNormalGradient(ctx, die, r, timeMs){
         const ang = (timeMs * 0.001) + (die.body.id);
         const r9 = r * 0.9;
         const gx = Math.cos(ang)*r9, gy = Math.sin(ang)*r9;
         const grad = ctx.createLinearGradient(gx, gy, -gx, -gy);
         
         if (die.flavor === 'hope' && die.sign === 1) {
            // White one side, yellow the other, black core
            grad.addColorStop(0.00, '#ffffff');
            grad.addColorStop(0.25, '#ffffff');
            grad.addColorStop(0.35, '#000000');
            grad.addColorStop(0.65, '#000000');
            grad.addColorStop(0.75, '#ffd700');
            grad.addColorStop(1.00, '#ffd700');
         } else if (die.flavor === 'fear' && die.sign === 1) {
            // Purple one side, red the other, black core
            grad.addColorStop(0.00, '#7f2aff');
            grad.addColorStop(0.25, '#7f2aff');
            grad.addColorStop(0.35, '#000000');
            grad.addColorStop(0.65, '#000000');
            grad.addColorStop(0.75, '#ff2a6d');
            grad.addColorStop(1.00, '#ff2a6d');
         } else if (die.color) {
            grad.addColorStop(0, die.color); grad.addColorStop(0.30, die.color);
            grad.addColorStop(0.42, '#000000'); grad.addColorStop(0.58, '#000000');
            grad.addColorStop(0.70, die.color); grad.addColorStop(1, die.color);
         } else if (die.sign < 0) {
            grad.addColorStop(0, '#ff3b3b'); grad.addColorStop(0.30, '#ff3b3b');
            grad.addColorStop(0.42, '#000000'); grad.addColorStop(0.58, '#000000');
            grad.addColorStop(0.70, '#ff3b3b'); grad.addColorStop(1, '#ff3b3b');
         } else {
            grad.addColorStop(0, '#00f5ff'); grad.addColorStop(0.30, '#00f5ff');
            grad.addColorStop(0.42, '#000000'); grad.addColorStop(0.58, '#000000');
            grad.addColorStop(0.70, '#00f5ff'); grad.addColorStop(1, '#00f5ff');
         }
         return grad;
      }

      // --- Main Loop ---
      handleResize();
      updateHUD();

      let last = performance.now();
      function tick(now){
        const dt = Math.min(33, now - last);
        last = now;

        Engine.update(engine, dt);

        const floorY = H - MARGIN + WALL_THICK/2 + 20;
        for(const d of dice){
           if (d.body.position.y > floorY) {
             Body.setPosition(d.body, { x: W/2, y: H/2 });
             Body.setVelocity(d.body, {x:0, y:0});
           }
           if (Math.hypot(d.body.velocity.x, d.body.velocity.y) < 0.1 && Math.abs(d.body.angularVelocity) < 0.05) {
              Body.setVelocity(d.body, {x:0, y:0});
              Body.setAngularVelocity(d.body, 0);
           }
        }

        // Draw
        ctx.clearRect(0, 0, W, H);
        ctx.drawImage(bgCanvas, 0, 0);

        // Draw linking strings between paired crit dice
        const drawnPairs = new Set();
        for (const d of dice) {
          if (d.isCrit && d.critPartner) {
            const pairKey = [d.index, d.critPartner.index].sort().join('-');
            if (drawnPairs.has(pairKey)) continue;
            drawnPairs.add(pairKey);
            const ax = d.body.position.x, ay = d.body.position.y;
            const bx = d.critPartner.body.position.x, by = d.critPartner.body.position.y;
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(ax, ay);
            ctx.lineTo(bx, by);
            ctx.strokeStyle = 'rgba(255, 215, 0, 0.5)';
            ctx.lineWidth = 2;
            ctx.shadowColor = 'rgba(255, 215, 0, 0.6)';
            ctx.shadowBlur = 10;
            ctx.setLineDash([6, 4]);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.restore();
          }
        }

        for (const d of dice){
            const b = d.body; const x = b.position.x, y = b.position.y;
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(b.angle);

            ctx.beginPath();
            const v = b.vertices;
            ctx.moveTo(v[0].x - x, v[0].y - y);
            for (let i=1; i<v.length; i++) ctx.lineTo(v[i].x - x, v[i].y - y);
            ctx.closePath();

            ctx.fillStyle = '#070a12';
            ctx.fill();

            ctx.lineWidth = 4;
            if (d.isCrit) {
               ctx.strokeStyle = getCritGradient(ctx, d, d.size, now);
               ctx.shadowColor = 'rgba(255,215,0,0.75)';
               ctx.shadowBlur = 35;
            } else {
               ctx.strokeStyle = getNormalGradient(ctx, d, d.size, now);
               ctx.shadowBlur = 0;
            }
            ctx.stroke();

            if (!d.isCrit) {
                ctx.lineWidth = 1.5; 
                ctx.strokeStyle = 'rgba(0,0,0,0.6)'; 
                ctx.stroke();
            }

            ctx.rotate(-b.angle);
            ctx.fillStyle = '#fff'; 
            ctx.font = '700 18px "Orbitron", sans-serif';
            ctx.textAlign = 'center'; 
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.8)'; 
            ctx.shadowBlur = 4;
            ctx.fillText((d.sign < 0 ? '-' : '') + d.value, 0, 0);
            ctx.restore();
        }

        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    })();
  </script>
</body>
